<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Tronco -->
  <rect x="85" y="120" width="30" height="70" fill="#8B4513" rx="5"/>
  
  <!-- Raízes -->
  <path d="M 80 190 Q 60 200 50 190" stroke="#8B4513" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 120 190 Q 140 200 150 190" stroke="#8B4513" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 100 190 Q 100 200 100 195" stroke="#8B4513" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Folhagem - Círculos concêntricos -->
  <circle cx="100" cy="60" r="55" fill="#D32F2F"/>
  <circle cx="70" cy="85" r="40" fill="#D32F2F"/>
  <circle cx="130" cy="85" r="40" fill="#D32F2F"/>
  <circle cx="100" cy="110" r="35" fill="#D32F2F"/>
  
  <!-- Detalhes da folhagem -->
  <circle cx="100" cy="50" r="50" fill="none" stroke="#B71C1C" stroke-width="2"/>
  <circle cx="75" cy="80" r="35" fill="none" stroke="#B71C1C" stroke-width="1.5"/>
  <circle cx="125" cy="80" r="35" fill="none" stroke="#B71C1C" stroke-width="1.5"/>
</svg>
